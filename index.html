<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日语词典 PWA</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="header">
    <div class="header-top">
      <h2>日语刷词 PWA</h2>
      <button id="themeToggle" class="icon-btn" onclick="toggleTheme()" title="切换深色模式">🌙</button>
    </div>
    <div class="tabs">
      <button id="searchTab" class="active" onclick="switchMode('search')">搜索模式</button>
      <button id="flashcardTab" onclick="switchMode('flashcards')">刷词模式</button>
      <button id="gojuonTab" onclick="switchMode('gojuon')">五十音图</button>
      <button id="libraryTab" onclick="switchMode('library')">词库管理</button>
    </div>
  </div>

  <div id="gojuon-mode" style="display: none;">
    <div class="gojuon-container">
      <div class="gojuon-tabs">
        <button class="active" onclick="switchGojuonType('seion')">清音</button>
        <button onclick="switchGojuonType('dakuon')">浊音/半浊音</button>
        <button onclick="switchGojuonType('youon')">拗音</button>
      </div>
      <div id="gojuon-grid" class="gojuon-grid">
        <!-- 五十音图将通过 JS 动态生成 -->
      </div>
    </div>
  </div>

  <div id="search-mode">
    <div class="search-controls">
      <div class="search-input-wrapper">
        <input type="text" id="search" placeholder="输入日语或中文搜索..." oninput="handleSearchInput()">
        <button id="searchBtn" class="search-btn" onclick="doOnlineSearch()" style="display: none;">翻译</button>
      </div>
      <div class="search-source-toggle">
        <button id="localSearchTab" class="active" onclick="setSearchSource('local')">词库</button>
        <button id="onlineSearchTab" onclick="setSearchSource('online')">联网</button>
      </div>
    </div>
    <div id="results">
      <div class="empty-state">
        <p>还没有单词，请在“词库管理”中创建并导入 CSV 文件</p>
      </div>
    </div>
  </div>

  <div id="library-mode" style="display: none;">
    <div class="library-manager">
      <div class="library-actions">
        <input type="text" id="newLibraryName" placeholder="输入新词库名称">
        <button class="primary-btn" onclick="createLibrary()">创建新词库</button>
      </div>
      <hr>
      <h3>词库列表</h3>
      <div id="library-list">
        <!-- 词库列表项将通过 JS 动态生成 -->
      </div>
      <input type="file" id="csvFile" accept=".csv" style="display: none;" onchange="importCSVToLibrary()">
    </div>
  </div>

  <div id="flashcard-mode" style="display: none;">
    <div class="flashcard-header">
      <div class="flashcard-lib-selector">
        <select id="flashcardLibrarySelect" onchange="changeFlashcardLibrary()">
          <!-- 动态填充已启用的词库 -->
        </select>
      </div>
      <div class="flashcard-options">
        <div class="autoplay-control">
          <input type="checkbox" id="autoplayCheck" onchange="toggleAutoplay()">
          <label for="autoplayCheck">自动播放</label>
        </div>
        <button id="modeToggleBtn" class="secondary-btn" onclick="toggleCardMode()">日 → 中</button>
        <button class="primary-btn" onclick="startFlashcards()">打乱并开始</button>
      </div>
    </div>
    
    <div class="flashcard-status">
      <span id="progress">0 / 0</span>
    </div>
    
    <div id="card" class="card" onclick="toggleAnswer()">
      <div class="card-inner">
        <div class="card-front">
          <div class="voice-btn-container">
            <button class="voice-btn" onclick="event.stopPropagation(); playCurrentWord()">🔊</button>
          </div>
          <div id="word-main">点击卡片开始</div>
          <div id="word-sub">或点击上方打乱按钮</div>
        </div>
        <div class="card-back">
          <div id="word-chinese"></div>
          <div id="word-reading"></div>
        </div>
      </div>
    </div>

    <div class="card-controls">
      <button onclick="prevCard()">上一个</button>
      <button class="mark-btn" onclick="markAsWrong()">记不住 ❌</button>
      <button class="next-btn" onclick="nextCard()">下一个</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
